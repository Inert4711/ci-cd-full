name: Full CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
    
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing
        env:
          PYTHONPATH: .

  trivy-scan:
    runs-on: ubuntu-latest
    needs: [test-matrix]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table

  bandit-scan:
    runs-on: ubuntu-latest
    needs: [test-matrix]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bandit
        run: |
          python -m pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r . \
            --severity-level medium \
            --confidence-level high \
            -f json \
            --output bandit_report.json || true
          cat bandit_report.json || echo "No issues found"

  build:
    runs-on: ubuntu-latest
    needs: [trivy-scan, bandit-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Build package
        run: |
          echo "Building package..."
          mkdir -p dist
          tar -czf dist/package.tar.gz .
          echo "version: ${{ github.sha }}" > dist/metadata.txt
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-package
          path: dist/

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          echo "version: ${{ github.sha }}"
          echo "Deployment to staging successful!"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment:
        name: production
        url: https://production.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Blue-Green Deployment
        run: |
          echo "Starting blue-green deployment to production..."
          echo "Version: ${{ github.sha }}"
          echo "Deployment to production successful!"

      - name: Rollback plan
        if: failure()
        run: |
          echo "Deployment failed. Initiating rollback..."
          echo "Rollback to previous stable version successful!"